name: Build macOS App

on:
  release:
    types: [published]

jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --name "PysternBlot" \
            --windowed \
            --noconfirm \
            --add-data "pysternblot/resources:pysternblot/resources" \
            pysternblot/__main__.py

      - name: Zip the .app
        run: |
          cd dist
          zip -r "../PysternBlot-${{ github.event.release.tag_name }}-macOS.zip" PysternBlot.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PysternBlot-${{ github.event.release.tag_name }}-macOS.zip